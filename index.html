<!doctype html>
<html lang="es" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Puter RSS Pro</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: "class" };
  </script>
  <style>
    * {
      scrollbar-width: thin;
      scrollbar-color: #888 transparent;
    }

    @media (min-width: 768px) and (max-width: 1024px) and (orientation: portrait) {
      .tablet-icon-only .tablet-label {
        display: none;
      }

      .tablet-icon-only {
        gap: 0.25rem;
      }
    }

    @media (max-width: 430px) {
      .mobile-filter-stack {
        grid-template-columns: 1fr;
      }

      .mobile-filter-stack #sortSelect {
        width: 100%;
      }

      .mobile-header-actions {
        justify-content: space-between;
      }
    }
  </style>
</head>

<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">
  <button onclick="toggleSidebar()" class="md:hidden p-4 fixed top-0 left-0 z-5 text-2xl" aria-label="Abrir menu"
    title="Menu">
    ☰
  </button>

  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar"
      class="fixed md:relative inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-40 w-80 border-r border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-4 flex flex-col shadow-xl md:shadow-none">
      <div class="flex items-center gap-3 mb-6 md:mt-0">
        <div class="text-2xl">📡</div>
        <h1 class="text-xl font-bold">Puter RSS</h1>
      </div>

      <div id="user-panel"
        class="mb-4 p-3 rounded-md border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900">
        <p id="user-status" class="text-xs text-slate-500 mb-2">
          No has iniciado sesion
        </p>
        <div class="flex gap-2">
          <button id="sign-in-btn" onclick="signInUser()"
            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-1.5 rounded-md text-xs font-medium">
            Iniciar sesion
          </button>
          <button id="sign-out-btn" onclick="signOutUser()"
            class="hidden flex-1 bg-slate-200 dark:bg-slate-700 py-1.5 rounded-md text-xs font-medium">
            Cerrar sesion
          </button>
        </div>
      </div>

      <div class="space-y-2 mb-6">
        <button onclick="openModal('cat')" aria-label="Crear categoria" title="Crear categoria"
          class="w-full bg-slate-600 text-white dark:bg-slate-700 py-2 rounded-md font-medium text-sm flex items-center justify-center gap-2">
          <span aria-hidden="true">📁</span>
          <span>Categoria</span>
        </button>
        <button onclick="openModal('feed')" aria-label="Anadir feed" title="Anadir feed"
          class="w-full bg-slate-300 text-slate-900 dark:bg-slate-700 dark:text-slate-50 py-2 rounded-md font-medium text-sm flex items-center justify-center gap-2">
          <span aria-hidden="true">📰</span>
          <span>Feed</span>
        </button>
      </div>

      <h3 class="text-xs font-bold text-slate-400 uppercase mb-2 px-2">
        Categorías
      </h3>
      <nav class="flex-1 overflow-y-auto space-y-1" id="category-list"></nav>

      <h3 class="text-xs font-bold text-slate-400 uppercase mt-6 mb-2 px-2">
        Gestionar Mis Fuentes
      </h3>
      <button onclick="openManageFeedsModal()" aria-label="Abrir gestor de fuentes" title="Gestor de fuentes"
        class="w-full bg-slate-200 dark:bg-slate-700 py-2 rounded-md font-medium text-sm flex items-center justify-center gap-2">
        <span aria-hidden="true">🛠️</span>
        <span>Gestor de Fuentes</span>
      </button>

      <div class="pt-4 mt-4 border-t border-slate-200 dark:border-slate-700 space-y-2">
        <h3 class="text-xs font-bold text-slate-400 uppercase px-2">
          Refresco Automatico
        </h3>
        <select id="refreshIntervalSelect" class="w-full px-2 py-1 rounded-md bg-slate-100 dark:bg-slate-700 text-sm"
          onchange="setRefreshInterval(this.value)" title="Frecuencia de refresco">
          <option value="60000">Cada 1 min</option>
          <option value="300000" selected>Cada 5 min</option>
          <option value="600000">Cada 10 min</option>
          <option value="1800000">Cada 30 min</option>
          <option value="3600000">Cada 60 min</option>
        </select>

        <label class="flex items-center gap-2 text-xs select-none px-1" title="Activar o pausar refresco automatico">
          <input id="auto-refresh-toggle" type="checkbox" checked onchange="setAutoRefreshEnabled(this.checked)" />
          <span id="auto-refresh-toggle-label">Auto ON</span>
        </label>

        <h3 class="text-xs font-bold text-slate-400 uppercase px-2 pt-2">
          Densidad de Tarjetas
        </h3>
        <select id="densitySelect" class="w-full px-2 py-1 rounded-md bg-slate-100 dark:bg-slate-700 text-sm"
          onchange="setLayoutDensity(this.value)" title="Densidad de tarjetas">
          <option value="auto">Auto</option>
          <option value="compact">Compacto</option>
          <option value="comfortable">Confort</option>
        </select>
      </div>

      <div class="pt-4 mt-4 border-t border-slate-200 dark:border-slate-700">
        <button id="theme-toggle-btn" onclick="toggleDarkMode()"
          class="w-full p-2 rounded-md hover:bg-slate-200 dark:hover:bg-slate-700 text-sm">
          <span id="theme-toggle-icon">🌓</span>
          <span id="theme-toggle-label">Cambiar Modo</span>
        </button>
      </div>
    </aside>

    <div id="overlay" onclick="toggleSidebar()" class="hidden md:hidden fixed inset-0 bg-black/50 z-30"></div>

    <main class="flex-1 flex flex-col bg-white dark:bg-slate-900 overflow-hidden">
      <header
        class="min-h-16 py-2 border-b border-slate-200 dark:border-slate-700 flex flex-col md:flex-row md:items-center md:justify-between px-3 sm:px-6 pl-16 md:pl-6 gap-2 md:gap-3">
        <div class="flex mx-auto md:mx-0 items-center gap-2">
          <div id="loader"
            class="hidden animate-spin h-5 w-5 border-2 border-blue-500 border-t-transparent rounded-full"></div>
          <h2 id="current-view-title" class="font-bold truncate w-full md:w-auto pr-2 text-sm sm:text-base">Noticias
            Recientes</h2>
        </div>


        <div class="tablet-icon-only w-full md:w-auto flex flex-col md:flex-row md:items-center gap-2 sm:gap-3">
          <div class="mobile-header-actions flex items-center justify-end gap-2 flex-wrap">
            <span id="refresh-status" class="hidden md:inline text-xs text-slate-500 dark:text-slate-300">
              Sin actualizar
            </span>

            <button onclick="openDiagnosticsModal()" aria-label="Abrir diagnostico" title="Diagnostico"
              class="h-9 px-2 py-1 rounded-md border border-slate-300 bg-slate-50 dark:bg-slate-800 dark:border-slate-600 text-xs hover:bg-slate-100 dark:hover:bg-slate-800">
              <span aria-hidden="true">🩺</span>
              <span class="tablet-label"> Diagnostico</span>
            </button>

            <button id="retry-failed-btn" onclick="retryFailedFeeds()" aria-label="Reintentar feeds fallidos"
              title="Reintentar"
              class="hidden h-9  px-2 py-1 rounded-md border border-amber-400 text-amber-700 dark:text-amber-200 text-xs hover:bg-amber-50 dark:hover:bg-amber-900/20">
              <span aria-hidden="true">🔁</span>
              <span class="tablet-label"> Reintentar</span>
            </button>

            <button onclick="openAiChatModal()" aria-label="Abrir chat IA" title="Chat IA"
              class="h-9 px-2 py-1 rounded-md border border-slate-300 bg-slate-50 dark:bg-slate-800 dark:border-slate-600 text-xs hover:bg-slate-100 dark:hover:bg-slate-800">
              <span aria-hidden="true">💬</span>
              <span class="tablet-label"> Chat IA</span>
            </button>
          </div>

          <div class="mobile-filter-stack w-full md:w-auto grid grid-cols-[minmax(0,1fr)_auto] gap-2">
            <input id="searchInput" type="text" placeholder="Buscar..." aria-label="Buscar noticias" title="Buscar"
              class="h-9 w-full min-w-0 px-3 rounded-md border border-slate-300 bg-slate-50 dark:bg-slate-800 dark:border-slate-600 text-sm hover:bg-slate-100 dark:hover:bg-slate-800"
              oninput="applyFilters()" />

            <select id="sortSelect"
              class="h-9 w-32 sm:w-36 px-2 rounded-md border border-slate-300 bg-slate-50 dark:bg-slate-800 dark:border-slate-600 text-sm hover:bg-slate-100 dark:hover:bg-slate-800"
              aria-label="Ordenar noticias" title="Orden" onchange="applyFilters()">
              <option value="desc">Más recientes</option>
              <option value="asc">Más antiguos</option>
              <option value="az">A → Z</option>
              <option value="za">Z → A</option>
            </select>
          </div>
        </div>
      </header>
      <div id="feed-container"
        class="flex-1 overflow-y-auto px-4 sm:px-6 pt-6 pb-10 md:pb-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
      </div>

      <div id="pagination" class="flex justify-center gap-1 mt-3 md:mt-6 pb-4 md:pb-6"></div>
      <footer class="px-6 pb-20 md:pb-4 text-[11px] text-slate-500 dark:text-slate-400 text-center">
        <a href="https://developer.puter.com" target="_blank" rel="noopener noreferrer" class="underline">Powered by
          Puter</a> by <a href="https://monchovarela.es" target="_blank" rel="noopener noreferrer"
          class="underline">Moncho Varela</a>.
      </footer>
    </main>
  </div>

  <nav
    class="md:hidden fixed bottom-0 inset-x-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur border-t border-slate-200 dark:border-slate-700 px-2 py-2">
    <div class="grid grid-cols-5 gap-1 text-[11px] font-medium">
      <button id="quick-action-home" onclick="loadAllFeeds()" data-quick-action="home" aria-label="Actualizar portada"
        title="Inicio"
        class="min-h-12 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 flex flex-col items-center justify-center leading-none transition-colors">
        <span aria-hidden="true" class="text-base">🏠</span>
        <span>Inicio</span>
      </button>
      <button id="quick-action-search" onclick="focusSearchInput()" data-quick-action="search"
        aria-label="Enfocar buscador" title="Buscar"
        class="min-h-12 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 flex flex-col items-center justify-center leading-none transition-colors">
        <span aria-hidden="true" class="text-base">🔎</span>
        <span>Buscar</span>
      </button>
      <button id="quick-action-chat" onclick="openAiChatModal()" data-quick-action="chat" aria-label="Abrir chat IA"
        title="Chat IA"
        class="min-h-12 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 flex flex-col items-center justify-center leading-none transition-colors">
        <span aria-hidden="true" class="text-base">💬</span>
        <span>Chat</span>
      </button>
      <button id="quick-action-feeds" onclick="openManageFeedsModal()" data-quick-action="feeds"
        aria-label="Gestionar feeds" title="Fuentes"
        class="min-h-12 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 flex flex-col items-center justify-center leading-none transition-colors">
        <span aria-hidden="true" class="text-base">🛠️</span>
        <span>Fuentes</span>
      </button>
      <button id="quick-action-theme" onclick="toggleDarkMode()" data-quick-action="theme" aria-label="Cambiar tema"
        title="Tema"
        class="min-h-12 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 flex flex-col items-center justify-center leading-none transition-colors">
        <span aria-hidden="true" class="text-base">🌓</span>
        <span>Tema</span>
      </button>
    </div>
  </nav>

  <div id="modal"
    class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-md w-full max-w-md shadow-2xl">
      <h3 id="modal-title" class="text-xl font-bold mb-4">Configuración</h3>
      <div id="modal-content" class="space-y-4"></div>
      <div class="flex justify-end gap-3 mt-8">
        <button onclick="closeModal()"
          class="px-4 py-2 text-slate-50 bg-red-400 hover:bg-red-300 transition rounded-md font-medium">
          Cancelar
        </button>
        <button id="modal-save"
          class="px-6 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-md font-bold transition">
          Guardar
        </button>
      </div>
    </div>
  </div>

  <div id="manage-feeds-modal"
    class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-md w-full max-w-2xl shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">Gestionar Mis Fuentes</h3>
        <button onclick="closeManageFeedsModal()" class="text-slate-500 hover:text-slate-900 dark:hover:text-white"
          aria-label="Cerrar gestor" title="Cerrar">
          ✕
        </button>
      </div>

      <div class="flex gap-2 mb-4">
        <button onclick="triggerConfigImport()" aria-label="Importar archivo JSON" title="Importar JSON"
          class="px-4 py-2 bg-slate-200 dark:bg-slate-700 rounded-md text-sm font-medium">
          <span aria-hidden="true">📥</span>
          <span class="hidden sm:inline"> Importar JSON</span>
        </button>
        <button onclick="createJsonBackup()" aria-label="Crear backup JSON" title="Crear backup"
          class="px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-md text-sm font-medium">
          <span aria-hidden="true">💾</span>
          <span class="hidden sm:inline"> Backup JSON</span>
        </button>
        <input id="config-import-input" type="file" accept="application/json,.json" class="hidden"
          onchange="handleConfigImport(event)" />
      </div>

      <div
        class="h-80 overflow-y-auto border border-slate-200 dark:border-slate-700 rounded-md p-2 bg-white dark:bg-slate-900"
        id="manage-feeds-list"></div>
    </div>
  </div>

  <div id="diagnostics-modal"
    class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-md w-full max-w-3xl shadow-2xl">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xl font-bold">Diagnostico de feeds</h3>
        <button onclick="closeDiagnosticsModal()" class="text-slate-500 hover:text-slate-900 dark:hover:text-white"
          aria-label="Cerrar diagnostico" title="Cerrar">✕</button>
      </div>

      <div id="diagnostics-content"
        class="h-96 overflow-y-auto border border-slate-200 dark:border-slate-700 rounded-md p-3 bg-slate-50 dark:bg-slate-900 text-xs">
      </div>
    </div>
  </div>

  <script src="feed-utils.js"></script>
  <script src="main.js"></script>

  <div id="toast-container" class="fixed bottom-4 right-4 z-[70] space-y-2 max-w-sm"></div>

  <div id="ai-summary-modal"
    class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 p-6 rounded-md w-full max-w-xl shadow-2xl">
      <div class="flex justify-between items-center gap-3 mb-4">
        <h3 class="text-lg font-bold">Resumen IA</h3>
        <button onclick="closeSummaryModal()" class="text-slate-500 hover:text-slate-900 dark:hover:text-white"
          aria-label="Cerrar resumen" title="Cerrar">
          ✕
        </button>
      </div>
      <div id="ai-summary-loader" class="hidden flex items-center gap-2 mb-3">
        <div class="animate-spin h-4 w-4 border-2 border-blue-500 border-t-transparent rounded-full"></div>
        <span class="text-xs text-slate-500 dark:text-slate-300">Generando resumen...</span>
      </div>
      <div id="ai-summary-content"
        class="text-sm text-slate-700 dark:text-slate-200 whitespace-pre-wrap leading-relaxed"></div>
    </div>
  </div>

  <div id="ai-chat-modal"
    class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 p-4 rounded-md w-full max-w-2xl shadow-2xl">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-lg font-bold">Asistente IA</h3>
        <div class="flex items-center gap-2">
          <button onclick="clearAiChat()" class="px-2 py-1 text-xs rounded-md bg-slate-200 dark:bg-slate-700"
            aria-label="Borrar chat" title="Borrar chat">
            <span aria-hidden="true">🧹</span>
            <span class="hidden sm:inline"> Borrar chat</span>
          </button>
          <button onclick="closeAiChatModal()" class="text-slate-500 hover:text-slate-900 dark:hover:text-white"
            aria-label="Cerrar chat" title="Cerrar">✕</button>
        </div>
      </div>

      <label class="flex items-center gap-2 mb-3 text-xs text-slate-600 dark:text-slate-300">
        <input id="ai-chat-safe-mode" type="checkbox" checked onchange="toggleAiChatSafeMode(this.checked)" />
        Modo seguro (pedir confirmación antes de ejecutar acciones)
      </label>

      <div id="ai-chat-messages"
        class="h-80 overflow-y-auto border border-slate-200 dark:border-slate-700 rounded-md p-3 bg-slate-50 dark:bg-slate-900 space-y-2">
      </div>

      <div class="mt-3 flex gap-2">
        <input id="ai-chat-input" type="text"
          placeholder="Ejemplo: añade la categoria Tecnologia y el feed https://example.com/rss"
          class="flex-1 px-3 py-2 rounded-md bg-slate-100 dark:bg-slate-700 text-sm"
          onkeydown="if(event.key==='Enter'){sendAiChatMessage()}" />
        <button id="ai-chat-send-btn" onclick="sendAiChatMessage()" aria-label="Enviar mensaje" title="Enviar"
          class="px-3 sm:px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-md text-sm font-bold">
          <span aria-hidden="true">📤</span>
          <span class="hidden sm:inline"> Enviar</span>
        </button>
      </div>
    </div>
  </div>
</body>

</html>
